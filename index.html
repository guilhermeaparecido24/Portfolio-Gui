<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulário de Contato</title>
</head>
<body>
  <link rel="stylesheet" href="style.css">

  <header><h1>Fale Conosco</h1></header>
    <span><h3>Preencha os campos abaixo e entraremos em contato em breve</h2></span>

  <form action="#" method="post">

    <label for="nome"><b>Nome</b></label>
    <input type="text" id="nome" name="nome" placeholder="Seu nome" required />

    <label for="sobrenome"><b>Sobrenome</b></label>
    <input type="text" id="sobrenome" name="sobrenome" placeholder="Seu sobrenome" required />

    <label for="email"><b>E-mail</b></label>
    <input type="email" id="email" name="email" placeholder="seu@email.com" required />

    <label for="telefone"><b>Telefone</b></label>
    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" />

    <label for="assunto"><b>Assunto</b></label>
    <select id="assunto" name="assunto" required>
      <option value="" disabled selected>Selecione uma opção</option>
      <option value="suporte">Suporte técnico</option>
      <option value="comercial">Comercial</option>
      <option value="parceria">Parceria</option>
      <option value="outro">Outro</option>
    </select>

    <label for="mensagem"><b>Mensagem</b></label>
    <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem aqui..." required></textarea>

    <label>
      <input type="checkbox" name="termos" required />
      <b>Concordo com os termos de uso e política de privacidade.</b>
    </label>

    <button id="env" type="submit">Enviar</button>
    <button type="reset">Limpar</button>

  </form>

</body>
</html>
